services:
  # ── Backend + Frontend (Python) ──
  - type: web
    name: sphera-radio
    runtime: python
    buildCommand: bash build.sh
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MINIAPP_DIR
        value: backend/static
      - key: AUDIO_DIR
        value: /tmp/sphera_audio
      - key: UPLOAD_DIR
        value: /tmp/sphera_uploads
      - key: DEBUG
        value: "false"
      - key: USE_ICECAST
        value: "false"
      - key: TTS_PROVIDER
        value: edge
      - key: WHISPER_MODEL
        value: small
      - key: DATABASE_URL
        fromDatabase:
          name: sphera-db
          property: connectionString
    healthCheckPath: /health
    plan: free

  # ── Telegram Bot ──
  - type: worker
    name: sphera-bot
    runtime: python
    rootDir: bot
    buildCommand: pip install python-telegram-bot==22.7 httpx==0.28.1
    startCommand: python bot.py
    plan: free

databases:
  - name: sphera-db
    databaseName: sphera_db
    user: sphera_user
    plan: free
