services:
  # ── Backend + Frontend (bitta service) ──
  - type: web
    name: sphera-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: MINIAPP_DIR
        value: /app/static
      - key: AUDIO_DIR
        value: /tmp/sphera_audio
      - key: UPLOAD_DIR
        value: /tmp/sphera_uploads
      - key: DEBUG
        value: "false"
      - key: USE_ICECAST
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: sphera-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: sphera-redis
          type: redis
          property: connectionString
    healthCheckPath: /health

  # ── Telegram Bot ──
  - type: worker
    name: sphera-bot
    runtime: docker
    dockerfilePath: bot/Dockerfile
    dockerContext: bot
    envVars:
      - key: INTERNAL_API_URL
        fromService:
          name: sphera-backend
          type: web
          property: host
          envVarKey: INTERNAL_API_URL

databases:
  - name: sphera-db
    databaseName: sphera_db
    user: sphera_user
    plan: free

  - name: sphera-redis
    plan: free
    ipAllowList: []
