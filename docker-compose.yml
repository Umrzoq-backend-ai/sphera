version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-radio_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/app/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  icecast:
    image: moul/icecast
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./infra/icecast/icecast.xml:/etc/icecast2/icecast.xml:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      ICECAST_HOST: icecast
      MINIAPP_DIR: /app/frontend
    volumes:
      - audio_data:${AUDIO_DIR:-/tmp/sphera_audio}
      - upload_data:${UPLOAD_DIR:-/tmp/sphera_uploads}
      - ./frontend:/app/frontend:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend

volumes:
  pgdata:
  audio_data:
  upload_data:
